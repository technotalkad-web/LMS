name: Ops AI review (daily)

# Layer 2 of the ops model (ops/RUNBOOK.md §1): a headless AI agent runs the
# daily ops review inside GitHub Actions, reads the watchdog digest + open
# incidents + recent workflow runs, and posts one "🤖 Daily AI review" comment
# on the rolling ops-digest issue.
#
# ── ENGINE-SWITCHABLE ────────────────────────────────────────────────────────
# The AI engine is pluggable (see ops/RUNBOOK.md "Switching the AI engine"):
#   * default:            claude  (subscription token — no metered billing)
#   * switch permanently: set repo VARIABLE OPS_REVIEW_ENGINE to claude|gemini
#                         (Settings → Secrets and variables → Actions → Variables)
#   * switch for one run: Actions → Run workflow → type the engine name
# All engines share the SAME instructions: ops/ops-review-prompt.md.
#
# Per-engine secrets:
#   claude → CLAUDE_CODE_OAUTH_TOKEN  (`claude setup-token`; draws on the
#            Claude Pro/Max plan allowance, no payment method attached, so
#            metered charges are impossible; on exhausted allowance the run
#            fails for the day — it never bills)
#   gemini → GEMINI_API_KEY           (AI Studio; free tier is 20 req/day —
#            live-tested INSUFFICIENT for one agentic review; only useful with
#            billing enabled on the key's Google Cloud project)
#   openai → OPENAI_API_KEY           (template below, commented — verify the
#            codex CLI invocation before first use)
#
# Safety is engine-independent: the job token has contents: read (cannot
# push) and each engine's tool allowlist permits only read tools + gh/curl/jq.
# Runs at 02:15 UTC (07:45 IST), 45 min after ops-watch.yml posts the digest.

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:
    inputs:
      engine:
        description: "AI engine for this run: claude | gemini (empty = repo variable OPS_REVIEW_ENGINE, else claude)"
        required: false
        type: string

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: ops-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
      # Resolution order: manual-run input > repo variable > claude.
      ENGINE: ${{ github.event.inputs.engine || vars.OPS_REVIEW_ENGINE || 'claude' }}
    steps:
      - uses: actions/checkout@v4

      - name: Announce engine + load the shared prompt
        id: prompt
        run: |
          echo "### 🤖 Ops review engine: \`${ENGINE}\`" >> "$GITHUB_STEP_SUMMARY"
          {
            echo "text<<OPS_PROMPT_EOF"
            cat ops/ops-review-prompt.md
            echo "OPS_PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── ENGINE: claude (default) ──────────────────────────────────────────
      - name: Review with Claude
        if: env.ENGINE == 'claude'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: >-
            --model claude-sonnet-5
            --max-turns 50
            --allowedTools "Read,Grep,Glob,Bash(gh issue:*),Bash(gh run:*),Bash(gh workflow:*),Bash(gh api:*),Bash(gh label:*),Bash(curl:*),Bash(jq:*),Bash(date:*)"
          prompt: ${{ steps.prompt.outputs.text }}

      # ── ENGINE: gemini ────────────────────────────────────────────────────
      # Works only with a billing-enabled key (free tier = 20 req/day, tested
      # insufficient). Trust var required for headless runs (CLI 0.50+).
      - name: Review with Gemini
        if: env.ENGINE == 'gemini'
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-3.5-flash
          settings: |
            {
              "coreTools": [
                "list_directory",
                "read_file",
                "read_many_files",
                "glob",
                "search_file_content",
                "run_shell_command(gh issue)",
                "run_shell_command(gh run)",
                "run_shell_command(gh workflow)",
                "run_shell_command(gh api)",
                "run_shell_command(gh label)",
                "run_shell_command(curl)",
                "run_shell_command(jq)",
                "run_shell_command(date)"
              ]
            }
          prompt: ${{ steps.prompt.outputs.text }}

      # ── ENGINE: openai (TEMPLATE — verify before first use) ───────────────
      # To enable: uncomment, add repo secret OPENAI_API_KEY, verify the codex
      # CLI's current non-interactive flags (https://github.com/openai/codex),
      # then set OPS_REVIEW_ENGINE=openai and extend the guard step below.
      # - name: Review with OpenAI Codex
      #   if: env.ENGINE == 'openai'
      #   env:
      #     OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      #   run: |
      #     npm install -g @openai/codex
      #     codex exec --full-auto "$(cat ops/ops-review-prompt.md)"

      - name: Fail on unknown engine
        if: env.ENGINE != 'claude' && env.ENGINE != 'gemini'
        run: |
          echo "::error::Unknown OPS_REVIEW_ENGINE '${ENGINE}' — supported: claude, gemini (openai is a commented template in this file)."
          exit 1
