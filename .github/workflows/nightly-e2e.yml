# Nightly Playwright run against staging.
#
# Catches regressions that slip past PR checks:
#   - third-party drift (Supabase Auth changes, Cloudflare runtime
#     updates, Gmail SMTP quirks)
#   - data shape changes from prod that staging mirrors
#   - flaky tests that pass once on PR but fail at scale over time
#
# Why this exists vs. PR-only e2e:
#   PR checks (.github/workflows/pr-checks.yml) only fire on code
#   changes. A Supabase migration applied directly to staging, or a
#   silent infra regression at 2 AM Tuesday, won't surface until the
#   next push — which could be days. UptimeRobot catches "is the page
#   up" but doesn't exercise login / invite / RBAC flows. This
#   workflow does.
#
# On failure: GitHub emails repo admins automatically. Upload
# Playwright report as an artifact (14-day retention) so you can
# download + inspect without re-running.
#
# Manual dispatch: enabled via workflow_dispatch so you can fire
# the full suite on demand without waiting for the next cron.
name: Nightly e2e (staging)

on:
  schedule:
    # 04:00 UTC daily = 09:30 IST — failures land in your inbox just
    # before standup.
    - cron: "0 4 * * *"
  workflow_dispatch: {}

concurrency:
  group: nightly-e2e
  cancel-in-progress: false

jobs:
  e2e:
    name: Nightly e2e (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Same secrets the PR-checks e2e job uses — points at staging.
      E2E_BASE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npx playwright test --reporter=list
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
      - name: Run summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## Nightly e2e ✅" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All Playwright specs passed against staging." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Nightly e2e ❌" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Playwright reported failures. Download the artifact \`playwright-report-nightly-${{ github.run_id }}\` for the full HTML report." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Common causes:" >> $GITHUB_STEP_SUMMARY
            echo "- Supabase Auth Site URL or Redirect URLs drifted (see docs/ops/supabase-auth-smtp.md Step 0)" >> $GITHUB_STEP_SUMMARY
            echo "- Staging Worker not rebuilt with current secrets" >> $GITHUB_STEP_SUMMARY
            echo "- Migration applied to staging but specs out of date" >> $GITHUB_STEP_SUMMARY
            echo "- Cloudflare / Supabase regional incident" >> $GITHUB_STEP_SUMMARY
          fi
