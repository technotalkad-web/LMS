name: Scheduled crons (prod)

# WHY THIS EXISTS
# OpenNext (@opennextjs/cloudflare) builds a Worker that exports only `fetch` —
# it does NOT synthesize a `scheduled` handler, so Cloudflare cron triggers in
# wrangler.toml fire events nothing receives. Result: every /api/cron/* job was
# silently dead in production (reminders, billing, reaper, report-view refresh,
# rls-audit). This workflow drives them externally by POSTing each endpoint with
# the shared CRON_SECRET, on the same schedule the wrangler.toml documented.
#
# REQUIRED REPO SECRETS (Settings → Secrets and variables → Actions):
#   PROD_CRON_SECRET  — must equal the prod Worker's CRON_SECRET
#   PROD_BASE_URL     — e.g. https://my-lms-prod.mentora.workers.dev
#
# NOTE: GitHub-hosted cron can be delayed/coalesced under load and only runs on
# the default branch. Fine for hourly/daily ops jobs. If you need precise timing,
# replace this with a dedicated tiny Cloudflare Worker that has a scheduled()
# handler and fetches these same endpoints.

on:
  schedule:
    - cron: "0 2 * * *"    # /api/cron/billing                — daily 02:00 UTC
    - cron: "0 3 * * *"    # /api/cron/reaper                 — daily 03:00 UTC
    - cron: "30 3 * * *"   # /api/cron/refresh-report-views   — daily 03:30 UTC
    - cron: "0 6 * * *"    # /api/cron/reminders              — daily 06:00 UTC
    - cron: "0 7 * * 1"    # /api/cron/rls-audit              — Mondays 07:00 UTC
    - cron: "*/5 * * * *"  # /api/cron/lrs-forward            — every 5 min (outbox retry net)
  workflow_dispatch:
    inputs:
      endpoint:
        description: "Cron endpoint path to invoke (manual run)"
        required: true
        default: "/api/cron/reminders"

jobs:
  invoke:
    runs-on: ubuntu-latest
    steps:
      - name: Map schedule → endpoint and POST it
        env:
          CRON_SECRET: ${{ secrets.PROD_CRON_SECRET }}
          BASE: ${{ secrets.PROD_BASE_URL }}
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL: ${{ github.event.inputs.endpoint }}
        run: |
          set -euo pipefail
          if [ -n "${SCHEDULE}" ]; then
            case "${SCHEDULE}" in
              "0 2 * * *")  P=/api/cron/billing ;;
              "0 3 * * *")  P=/api/cron/reaper ;;
              "30 3 * * *") P=/api/cron/refresh-report-views ;;
              "0 6 * * *")  P=/api/cron/reminders ;;
              "0 7 * * 1")  P=/api/cron/rls-audit ;;
              "*/5 * * * *") P=/api/cron/lrs-forward ;;
              *) echo "Unknown schedule '${SCHEDULE}'"; exit 1 ;;
            esac
          else
            P="${MANUAL}"
          fi
          echo "POST ${BASE}${P}"
          code=$(curl -sS -o /tmp/body -w "%{http_code}" -X POST \
            -H "x-cron-secret: ${CRON_SECRET}" "${BASE}${P}")
          echo "HTTP ${code}"
          cat /tmp/body || true
          echo
          if [ "${code}" != "200" ]; then
            echo "::error::Cron ${P} returned ${code}"
            exit 1
          fi
