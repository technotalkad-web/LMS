# PR checks — pull_request covers PR branches; push covers main (post-merge).
# Three parallel jobs: typecheck, lint, e2e.
# Failure on any blocks PR merge (when branch protection is enabled).
#
# push was previously ["**"], which made every PR-branch commit run the
# workflow TWICE (push + pull_request). Besides duplicate required checks,
# the two e2e suites hit the staging worker's auth concurrently from one CI
# IP — bursty enough to trip rate limits and randomly fail logins in one of
# the twins. One run per commit fixes both.
name: PR checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

# Cancel in-progress runs for the same ref when a newer commit lands.
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # E2E points at the deployed STAGING worker — keeps CI simple
    # (no need to spin up next dev + a local Postgres) at the cost of
    # not testing the exact PR's code until it's deployed to staging.
    # Trade-off acceptable for v0; switch to "build + start in CI" when
    # the test suite grows past ~50 specs.
    env:
      E2E_BASE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npx playwright test --reporter=list
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
